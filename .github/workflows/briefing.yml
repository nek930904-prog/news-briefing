name: 증시 브리핑 자동 작성

# 언제 실행할지 정합니다.
on:
  # 실행은 외부 스케줄러(cron-job.org)가 매일 07:00(KST)에 이 워크플로우를
  # workflow_dispatch API로 깨워서 합니다. (GitHub 자체 schedule은 누락이 잦아 제거)
  workflow_dispatch:

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    steps:
      # 1) 코드 내려받기
      - name: 코드 가져오기
        uses: actions/checkout@v4

      # 2) 파이썬 준비
      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3) 필요한 부품 설치
      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      # 4) 프로그램 실행 (비밀값은 GitHub Secrets에서 가져옵니다)
      - name: 브리핑 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        run: python main.py
