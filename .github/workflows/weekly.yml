name: 주간 증시 브리핑 자동 작성

on:
  # 실행은 외부 스케줄러(cron-job.org)가 매주 일요일 18:00(KST)에 이 워크플로우를
  # workflow_dispatch API로 깨워서 합니다. (GitHub 자체 schedule은 누락이 잦아 제거)
  workflow_dispatch:

jobs:
  run-weekly-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 주간 브리핑 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        run: python weekly.py
